<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiyatlı — A101 Fiyat Sorgulama</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Fiyatlı</h1>
      <p class="subtitle">A101 ürün fiyatlarını saniyelerde sorgula</p>
    </header>

    <main>
      <section class="search-section">
        <form id="text-search-form" class="search-box">
          <input
            type="text"
            id="query"
            placeholder="Ürün adı gir (örn: süt, ekmek, domates)..."
            required
            autocomplete="off"
          />
          <button type="submit">Ara</button>
        </form>

        <div class="divider">
          <span>veya</span>
        </div>

        <label class="photo-upload" for="photo-input">
          <span class="photo-icon">📷</span>
          <span class="photo-text">Fotoğraf ile ara</span>
          <input
            type="file"
            id="photo-input"
            accept="image/*"
            capture="environment"
            style="display:none;"
          />
        </label>

        <div id="preview-container" class="preview-container hidden">
          <img id="preview" src="" alt="Yüklenen fotoğraf" />
          <button id="clear-photo" class="clear-btn" type="button">✕</button>
        </div>

        <div id="search-status" class="status" style="display:none;"></div>
      </section>

      <section id="results" class="results" style="display:none;">
        <h2>Sonuçlar</h2>
        <div id="results-list" class="results-list"></div>
      </section>

      <section id="no-results" class="no-results" style="display:none;">
        <p>Sonuç bulunamadı 😔</p>
      </section>

      <section id="error-box" class="error-box" style="display:none;">
        <p id="error-text"></p>
      </section>
    </main>

    <footer>
      <p>Fiyatlı v1.0.0 · Veriler a101.com.tr'den çekilir</p>
    </footer>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
