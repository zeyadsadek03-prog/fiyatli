<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiyatlı — A101 Fiyat Sorgulama</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Fiyatlı</h1>
      <p class="subtitle">A101 ürün fiyatlarını saniyelerde sorgula</p>
    </header>

    <main>
      <section class="search-section">
        <form id="search-form" class="search-box">
          <input
            type="text"
            id="query"
            placeholder="Ürün adı gir (örn: süt, ekmek, domates)..."
            required
            autocomplete="off"
          />
          <button type="submit">Ara</button>
        </form>

        <button id="photo-search-btn" class="photo-search-btn" type="button">
          📷 Fotoğraf ile ara
        </button>
        <input
          type="file"
          id="photo-input"
          accept="image/*"
          style="display:none;"
        />

        <div id="photo-status" class="status" style="display:none;"></div>

        <section id="results" class="results" style="display:none;">
          <h2>Sonuçlar</h2>
          <div id="results-list" class="results-list"></div>
        </section>

        <div id="no-results" class="no-results" style="display:none;">
          <p>Sonuç bulunamadı 😔</p>
        </div>

        <button id="load-more-btn" class="load-more-btn" type="button" style="display:none;">
          Daha fazla göster
        </button>

        <section id="error-box" class="error-box" style="display:none;">
          <p id="error-text"></p>
        </section>
      </section>
    </main>

    <footer>
      <p>Fiyatlı · Veriler a101.com.tr'den çekilir</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
